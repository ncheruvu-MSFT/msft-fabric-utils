# Shared steps — install fabric-cicd + Fabric CLI.
# Auth happens later per-step via AzureCLI@2 with workload identity federation
# (addSpnToEnvironment: true) — no client secret is used or required.
parameters:
  - name: pythonVersion
    type: string
    default: '3.11'

steps:
  - task: UsePythonVersion@0
    inputs:
      versionSpec: ${{ parameters.pythonVersion }}
    displayName: 'Use Python ${{ parameters.pythonVersion }}'

  - script: |
      python -m pip install --upgrade pip
      pip install fabric-cicd ms-fabric-cli pyyaml requests azure-identity
    displayName: 'Install fabric-cicd + fab CLI'
