# ============================================================
# Fabric Analytics Pipeline — KQL / Eventstream / RTI deploys
# ============================================================
name: Fabric-Analytics-$(Date:yyyyMMdd)-$(Rev:r)

trigger:
  branches: { include: [main] }
  paths:    { include: [fabric/analytics/**] }

pr:
  branches: { include: [main] }

variables:
  - group: fabric-shared

stages:
- stage: Build
  jobs:
    - job: validate
      pool: { vmImage: 'ubuntu-latest' }
      steps:
        - checkout: self
        - template: templates/validate-artifacts.yml

- stage: DeployDev
  dependsOn: Build
  variables: [ { group: fabric-dev } ]
  jobs:
    - deployment: deploy_dev
      environment: fabric-dev
      pool: { vmImage: 'ubuntu-latest' }
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self
              - template: templates/capacity-control.yml
                parameters: { action: resume }
              - template: templates/deploy-with-fabric-cicd.yml
                parameters:
                  itemsPath: 'fabric/analytics'
                  itemTypes: ['Eventstream', 'KQLDatabase', 'KQLQueryset']

- stage: DeployTest
  dependsOn: DeployDev
  variables: [ { group: fabric-test } ]
  jobs:
    - deployment: deploy_test
      environment: fabric-test
      pool: { vmImage: 'ubuntu-latest' }
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self
              - template: templates/capacity-control.yml
                parameters: { action: resume }
              - template: templates/deploy-with-fabric-cicd.yml
                parameters:
                  itemsPath: 'fabric/analytics'
                  itemTypes: ['Eventstream', 'KQLDatabase', 'KQLQueryset']

- stage: DeployProd
  dependsOn: DeployTest
  variables: [ { group: fabric-prod } ]
  jobs:
    - deployment: deploy_prod
      environment: fabric-prod
      pool: { vmImage: 'ubuntu-latest' }
      strategy:
        runOnce:
          deploy:
            steps:
              - checkout: self
              - template: templates/capacity-control.yml
                parameters: { action: resume }
              - template: templates/deploy-with-fabric-cicd.yml
                parameters:
                  itemsPath: 'fabric/analytics'
                  itemTypes: ['Eventstream', 'KQLDatabase', 'KQLQueryset']
              - template: templates/trigger-purview-scan.yml
                parameters: { collection: '$(PURVIEW_COLLECTION)' }
